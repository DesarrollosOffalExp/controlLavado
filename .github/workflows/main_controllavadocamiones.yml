# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - controllavadocamiones

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Evita que dos deploys se pisen: cancela el anterior.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Un solo job: se compila y se deploya en el mismo runner.
# Antes eran dos jobs (build + deploy) y había que pasar el publish entero como
# artifact, lo que consumía almacenamiento de Actions en CADA deploy (era el que
# llenaba el 0.5 GB del plan). dotnet publish ya compila, así que el paso
# "dotnet build" separado también se elimina por redundante.
jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{ github.workspace }}/publish"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'controllavadocamiones'
          slot-name: 'Production'
          package: "${{ github.workspace }}/publish"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_52CC161B9BF543188E74991E14198DC5 }}
